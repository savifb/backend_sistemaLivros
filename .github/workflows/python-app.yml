name: FastAPI CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: fastapi-app
  IMAGE_TAG: latest

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout do repositório
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Configurar Python 3.9
      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      # 3. Cache das dependências do Poetry (otimização)
      - name: Cache Poetry dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pypoetry
            ~/.local/share/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      # 4. Instalar Poetry via pip
      - name: Install Poetry
        run: pip install poetry

      # 5. Instalar dependências do projeto
      - name: Install dependencies
        run: poetry install --no-root --no-interaction

      # 6. Rodar os testes com pytest
      - name: Run tests
        run: poetry run pytest --tb=short -v

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test  # só executa se os testes passarem

    steps:
      # 1. Checkout do repositório
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Construir a imagem Docker
      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            --file Dockerfile \
            .

      # 3. Verificar se a imagem foi criada com sucesso
      - name: Verify Docker image exists
        run: docker image inspect ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      # 4. Rodar o container brevemente para validar que sobe sem erros
      - name: Smoke test — run container
        run: |
          docker run \
            --detach \
            --name fastapi-smoke-test \
            --publish 8000:8000 \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

          # Aguarda a aplicação inicializar
          sleep 5

          # Captura logs independente do resultado (para debug)
          echo "=== Container Logs ==="
          docker logs fastapi-smoke-test || true

          # Verifica se o container ainda está de pé
          if ! docker ps --filter "name=fastapi-smoke-test" --filter "status=running" | grep -q fastapi-smoke-test; then
            echo "❌ Container crashed on startup. See logs above."
            exit 1
          fi

          echo "✅ Container is running successfully."
          docker stop fastapi-smoke-test
          docker rm fastapi-smoke-test

      # 5. Exibe logs mesmo se o step anterior falhar
      - name: Dump container logs on failure
        if: failure()
        run: docker logs fastapi-smoke-test 2>/dev/null || echo "Container already removed or never started."
